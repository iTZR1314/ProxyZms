name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支/PR 有新提交时取消旧的运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: clippy & build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 在两个真实目标平台上检查,覆盖各自的 cfg(target_os) 代码分支
        include:
          - name: macos
            os: macos-14
          - name: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.name }}

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release