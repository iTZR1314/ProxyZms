name: Build & Release

# 推送 v* 标签时构建并发布;也可在 Actions 页手动触发(只构建,不发版)。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # 创建 Release / 上传产物需要

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14 # Apple Silicon,原生 arm64
            platform: macos
            target: aarch64-apple-darwin
            # 只让 dx 产出 .app;dmg 由收集步骤 ad-hoc 签名后自己打包
            package-types: macos
          - name: windows-x64
            os: windows-latest # x86_64
            platform: windows
            target: x86_64-pc-windows-msvc
            package-types: nsis
          - name: windows-arm64
            os: windows-11-arm # 原生 arm64 runner(公开仓库免费)
            platform: windows
            target: aarch64-pc-windows-msvc
            package-types: nsis

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      # 用 binstall 拉预编译的 dx,避免从源码编译 dioxus-cli(慢)。
      # 版本与 Cargo.toml 里的 dioxus 0.7.1 对齐。
      - name: Install Dioxus CLI
        # GITHUB_TOKEN:让 binstall 带认证访问 GitHub,避免匿名限流导致探测超时;
        # --disable-strategies compile:禁止回退到源码编译(dioxus-cli 0.7.1 的 rhai 依赖会编译失败),
        # 找不到预编译包时快速失败,而不是浪费十分钟编译再挂。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo binstall dioxus-cli@0.7.1 -y --force --disable-strategies compile

      - name: Bundle
        # 原生 runner 上 dx 默认按宿主架构构建,无需交叉编译。
        run: dx bundle --release --platform ${{ matrix.platform }} --package-types ${{ matrix.package-types }}

      # ---- 收集产物 ----
      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          # dx bundle 直接产出以 Cargo [package].name 命名的 .app(已是「VPN-JR.app」),
          # CFBundleName / CFBundleDisplayName / CFBundleExecutable 也一并对了 —— 无需后处理。
          app=$(find target -type d -name '*.app' -path '*bundle*' | head -n1)
          if [ -z "$app" ]; then echo "::error::未找到 .app 产物"; exit 1; fi
          echo "found app: $app"

          # 注入 BLE 权限描述键:macOS 11+ 第一次访问 CoreBluetooth 必须有
          # NSBluetoothAlwaysUsageDescription 否则 SIGABRT。dx 默认不写这个,
          # 必须在 codesign **之前**注入(签名后改 Info.plist 会破坏签名)。
          ./scripts/inject-macos-info-plist.sh "$app"

          # ad-hoc(-)深度签名:Apple Silicon 上没有任何签名会「已损坏打不开」。
          # 这不是 Apple 公证,Gatekeeper 仍会提示——用户首次打开需右键打开或解除隔离(见 README)。
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict --verbose=2 "$app"

          # 自己用 hdiutil 打 dmg,放一个 Applications 软链做「拖入安装」。
          # -volname 用品牌名,挂载 dmg 时 Finder 侧栏显示「VPN JR」。
          staging=$(mktemp -d)
          cp -R "$app" "$staging/"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "VPN JR" -srcfolder "$staging" -ov -format UDZO \
            "$PWD/artifacts/ProxyZms-${{ matrix.name }}.dmg"
          rm -rf "$staging"
          ls -la artifacts

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          # NSIS 安装器 .exe
          Get-ChildItem -Recurse target -Filter *.exe |
            Where-Object { $_.FullName -match 'bundle' } |
            ForEach-Object { Copy-Item $_.FullName "artifacts/ProxyZms-${{ matrix.name }}-setup.exe" }
          Get-ChildItem artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: artifacts/*
          if-no-files-found: error

      # ---- 仅标签触发时发布到 Release(各 job 追加自己的产物到同一 tag)----
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true