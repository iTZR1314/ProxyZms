[application]
# dx 0.7 要求 [application] 表必须存在(即使为空),否则解析报 missing field `application`。
# 注:macOS .app 名 / Windows NSIS 显示名 全部从 Cargo.toml 的 [package].name 派生,
# 这里不需要 [application].name(实测 dx 0.7 的 bundler 不读)。

[bundle]
identifier = "top.zhoumaosen"
publisher = "ZHOUMAOSEN"
icon = ["assets/fmr.ico", "assets/fmr.png"]

[web.app]

# HTML title tag content
title = "proxy-zms"

# include `assets` in web platform
[web.resource]

# Additional CSS style files
style = []

# Additional JavaScript files
script = []

[web.resource.dev]

# Javascript code file
# serve: [dev-server] only
script = []
